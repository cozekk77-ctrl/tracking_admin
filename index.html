<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoTrack — Check In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --accent: #00ff88;
    --accent2: #00bfff;
    --text: #e6edf3;
    --muted: #7d8590;
    --border: rgba(255,255,255,0.08);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    width: 350px; height: 350px;
    background: rgba(0,255,136,0.06);
    top: -100px; left: 50%;
    transform: translateX(-50%);
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(20px)} }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.4)} 50%{box-shadow:0 0 0 8px rgba(0,255,136,0)} }
  .logo-text { font-size: 22px; font-weight: 800; }
  .logo-text span { color: var(--accent); }

  h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

  .input-group { margin-bottom: 16px; }
  .input-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; display: block;
  }
  .input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 600;
    outline: none; transition: all 0.2s; width: 100%;
  }
  .input-field:focus {
    border-color: rgba(0,255,136,0.4);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
  }
  .input-field::placeholder { color: var(--muted); font-weight: 400; }
  .input-field.error { border-color: rgba(255,71,87,0.5); }

  .btn {
    width: 100%; padding: 15px;
    border-radius: 10px; border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 12px;
  }
  .btn-detect {
    background: var(--surface2);
    color: var(--accent2);
    border: 1px solid rgba(0,191,255,0.3);
  }
  .btn-detect:hover:not(:disabled) {
    background: rgba(0,191,255,0.08);
    border-color: var(--accent2);
  }
  .btn-submit {
    background: var(--accent);
    color: #080c10;
  }
  .btn-submit:hover:not(:disabled) {
    background: #00ffaa;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    transform: translateY(-1px);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .location-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: none;
  }
  .location-box.show { display: block; }
  .location-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 6px;
  }
  .location-row:last-child { margin-bottom: 0; }
  .loc-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .loc-value { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); }

  .status-msg {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px; font-weight: 600;
    margin-bottom: 16px;
    display: none;
  }
  .status-msg.show { display: flex; }
  .status-msg.loading { background: rgba(0,191,255,0.08); color: var(--accent2); border: 1px solid rgba(0,191,255,0.2); }
  .status-msg.success { background: rgba(0,255,136,0.08); color: var(--accent); border: 1px solid rgba(0,255,136,0.2); }
  .status-msg.error { background: rgba(255,71,87,0.08); color: #ff4757; border: 1px solid rgba(255,71,87,0.2); }

  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .success-screen {
    text-align: center;
    display: none;
    animation: fadeUp 0.5s ease;
  }
  .success-screen.show { display: block; }
  .success-icon {
    width: 80px; height: 80px;
    background: rgba(0,255,136,0.1);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin: 0 auto 20px;
    animation: successPop 0.5s ease;
  }
  @keyframes successPop { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .success-title { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
  .success-sub { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .success-coords {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 16px;
    text-align: left;
  }
  .btn-again {
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-again:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="orb"></div>

<div class="card">
  <!-- FORM -->
  <div id="formSection">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">Geo<span>Track</span></div>
    </div>

    <h1>Check In</h1>
    <p class="subtitle">Masukkan nama dan kongsi lokasi anda dengan admin.</p>

    <div class="input-group">
      <label class="input-label">Nama Penuh</label>
      <input type="text" class="input-field" id="nameInput" placeholder="Contoh: Ahmad Razif..." autocomplete="off" />
    </div>

    <div class="status-msg" id="statusMsg">
      <span id="statusIcon">⏳</span>
      <span id="statusText">Loading...</span>
    </div>

    <div class="location-box" id="locationBox">
      <div class="location-row">
        <span class="loc-label">Latitude</span>
        <span class="loc-value" id="latDisplay">—</span>
      </div>
      <div class="location-row">
        <span class="loc-label">Longitude</span>
        <span class="loc-value" id="lngDisplay">—</span>
      </div>
      <div class="location-row">
        <span class="loc-label">Accuracy</span>
        <span class="loc-value" id="accDisplay">—</span>
      </div>
    </div>

    <button class="btn btn-detect" id="detectBtn" onclick="detectLocation()">
      <span id="detectIcon">📍</span>
      <span id="detectText">Detect Lokasi Saya</span>
    </button>

    <button class="btn btn-submit" id="submitBtn" onclick="submitData()" disabled>
      <span>✅</span>
      <span>Hantar ke Admin</span>
    </button>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <div class="success-title">Berjaya!</div>
    <div class="success-sub">Lokasi anda telah dihantar kepada admin. Terima kasih!</div>
    <div class="success-coords" id="successCoords"></div>
    <button class="btn-again" onclick="resetForm()">↩ Check in lagi</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKEBjSdoLFCgGJFFdLIzP0-_Xf_VK2Jtk",
    authDomain: "trackingapps-fb953.firebaseapp.com",
    projectId: "trackingapps-fb953",
    storageBucket: "trackingapps-fb953.firebasestorage.app",
    messagingSenderId: "803582755164",
    appId: "1:803582755164:web:6f6d90970b5859c2fbc199",
    measurementId: "G-8QH68HLRL5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let currentLocation = null;
  let isDetecting = false;

  window.detectLocation = function() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('nameInput').classList.add('error');
      showStatus('error', '⚠️', 'Sila masukkan nama dahulu');
      setTimeout(() => document.getElementById('nameInput').classList.remove('error'), 2000);
      return;
    }
    if (isDetecting) return;
    if (!navigator.geolocation) {
      showStatus('error', '❌', 'Browser tidak support Geolocation');
      return;
    }

    isDetecting = true;
    document.getElementById('detectBtn').disabled = true;
    document.getElementById('detectIcon').textContent = '⏳';
    document.getElementById('detectText').textContent = 'Sedang detect...';
    document.getElementById('locationBox').classList.remove('show');
    document.getElementById('submitBtn').disabled = true;
    currentLocation = null;

    showStatus('loading', '🔄', 'Mendapatkan koordinat GPS...');

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        isDetecting = false;
        const { latitude, longitude, accuracy } = pos.coords;
        currentLocation = { latitude, longitude, accuracy };

        document.getElementById('latDisplay').textContent = latitude.toFixed(6);
        document.getElementById('lngDisplay').textContent = longitude.toFixed(6);
        document.getElementById('accDisplay').textContent = `±${Math.round(accuracy)}m`;
        document.getElementById('locationBox').classList.add('show');

        document.getElementById('detectBtn').disabled = false;
        document.getElementById('detectIcon').textContent = '🔄';
        document.getElementById('detectText').textContent = 'Detect Semula';
        document.getElementById('submitBtn').disabled = false;

        showStatus('success', '✅', `Lokasi ditemui! Accuracy ±${Math.round(accuracy)}m`);
      },
      (err) => {
        isDetecting = false;
        document.getElementById('detectBtn').disabled = false;
        document.getElementById('detectIcon').textContent = '📍';
        document.getElementById('detectText').textContent = 'Detect Lokasi Saya';

        let msg = '';
        switch(err.code) {
          case 1: msg = 'Permission ditolak. Benarkan akses lokasi di browser.'; break;
          case 2: msg = 'Lokasi tidak dapat dikesan. Cuba semula.'; break;
          case 3: msg = 'Timeout. Cuba semula.'; break;
          default: msg = 'Ralat tidak diketahui.';
        }
        showStatus('error', '❌', msg);
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  };

  window.submitData = async function() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name || !currentLocation) return;

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerHTML = '<span class="spin">⏳</span> <span>Menghantar...</span>';

    try {
      await addDoc(collection(db, 'locations'), {
        name: name,
        latitude: currentLocation.latitude,
        longitude: currentLocation.longitude,
        accuracy: currentLocation.accuracy,
        timestamp: serverTimestamp(),
        userAgent: navigator.userAgent.substring(0, 100)
      });

      // Show success
      document.getElementById('successCoords').textContent =
        `Nama: ${name}\nLat: ${currentLocation.latitude.toFixed(6)}\nLng: ${currentLocation.longitude.toFixed(6)}\nAccuracy: ±${Math.round(currentLocation.accuracy)}m`;

      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successScreen').classList.add('show');

    } catch (err) {
      console.error(err);
      showStatus('error', '❌', 'Gagal hantar data. Cuba semula.');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').innerHTML = '<span>✅</span> <span>Hantar ke Admin</span>';
    }
  };

  window.resetForm = function() {
    document.getElementById('nameInput').value = '';
    document.getElementById('locationBox').classList.remove('show');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerHTML = '<span>✅</span> <span>Hantar ke Admin</span>';
    document.getElementById('detectIcon').textContent = '📍';
    document.getElementById('detectText').textContent = 'Detect Lokasi Saya';
    document.getElementById('detectBtn').disabled = false;
    document.getElementById('statusMsg').classList.remove('show');
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('successScreen').classList.remove('show');
    currentLocation = null;
  };

  function showStatus(type, icon, text) {
    const el = document.getElementById('statusMsg');
    el.className = `status-msg show ${type}`;
    document.getElementById('statusIcon').textContent = icon;
    document.getElementById('statusText').textContent = text;
  }

  // Enter key
  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.detectLocation();
  });
</script>
</body>
</html>
