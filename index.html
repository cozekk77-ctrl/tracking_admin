<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoTrack — Check In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0c; --s1: #111111; --s2: #161616; --s3: #1e1e1e; --s4: #262626;
    --border: #2a2a2a; --border2: #383838;
    --text: #f0f0f0; --sub: #888888; --faint: #505050;
    --green: #22c55e; --green-dim: rgba(34,197,94,0.08); --green-b: rgba(34,197,94,0.2);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.08); --blue-b: rgba(96,165,250,0.2);
    --red: #f87171; --red-dim: rgba(248,113,113,0.08); --red-b: rgba(248,113,113,0.2);
    --r: 8px; --rl: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }
  .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .card { width: 100%; max-width: 380px; background: var(--s1); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); animation: up 0.4s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .site-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .site-name span { color: var(--faint); font-weight: 400; }
  .live-row { display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-text { font-size: 11px; font-weight: 500; color: var(--green); }
  .card-body { padding: 24px 20px; }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 5px; }
  .desc  { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 22px; }
  .loc-block { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 18px; transition: border-color 0.25s; }
  .loc-block.detecting { border-color: var(--blue-b); }
  .loc-block.success   { border-color: var(--green-b); }
  .loc-block.error     { border-color: var(--red-b); }
  .loc-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--s2); }
  .loc-icon { width: 32px; height: 32px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.25s; }
  .detecting .loc-icon { background: var(--blue-dim); }
  .success   .loc-icon { background: var(--green-dim); }
  .error     .loc-icon { background: var(--red-dim); }
  .loc-icon svg { width: 15px; height: 15px; }
  .loc-title { font-size: 12px; font-weight: 500; margin-bottom: 1px; transition: color 0.25s; }
  .detecting .loc-title { color: var(--blue); }
  .success   .loc-title { color: var(--green); }
  .error     .loc-title { color: var(--red); }
  .loc-sub { font-size: 11px; color: var(--faint); line-height: 1.4; }
  .coords-panel { padding: 10px 14px 12px; border-top: 1px solid var(--border); display: none; }
  .coords-panel.show { display: block; }
  .coords-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .coord-item { display: flex; flex-direction: column; gap: 2px; }
  .coord-key { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--faint); }
  .coord-val { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--green); }
  .acc-row { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); }
  .acc-key { font-size: 11px; color: var(--sub); }
  .acc-val { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--green); font-weight: 700; }
  .retry-area { padding: 0 14px 12px; display: none; }
  .retry-btn { width: 100%; padding: 8px; background: var(--red-dim); border: 1px solid var(--red-b); color: var(--red); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; border-radius: var(--r); cursor: pointer; transition: all 0.15s; }
  .retry-btn:hover { background: rgba(248,113,113,0.14); }
  .sep { height: 1px; background: var(--border); margin: 18px 0; }
  .label { display: block; font-size: 11px; font-weight: 500; color: var(--faint); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input { width: 100%; background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); padding: 11px 13px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; -webkit-appearance: none; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; margin-bottom: 12px; }
  .input:focus { border-color: var(--border2); background: var(--s3); box-shadow: 0 0 0 3px rgba(255,255,255,0.03); }
  .input::placeholder { color: var(--faint); }
  .input.err { border-color: var(--red-b) !important; animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .submit { width: 100%; padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: var(--r); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.15s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .submit:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
  .submit:disabled { opacity: 0.22; cursor: not-allowed; transform: none !important; }
  .spin { width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.15); border-top-color: var(--bg); border-radius: 50%; animation: rot 0.6s linear infinite; }
  @keyframes rot { to{transform:rotate(360deg)} }
  .arc { animation: rot 1s linear infinite; transform-origin: 12px 12px; }
  .success-view { display: none; text-align: center; animation: fadeUp 0.4s ease both; }
  .success-view.show { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .check-ring { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--green-b); background: var(--green-dim); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; animation: pop 0.4s cubic-bezier(0.22,1,0.36,1); }
  @keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }
  .check-ring svg { width: 28px; height: 28px; }
  .s-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); margin-bottom: 5px; }
  .s-desc  { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 18px; }
  .data-box { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; text-align: left; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--sub); line-height: 2; }
  .data-box b { color: var(--text); font-weight: 700; }
  .back-btn { width: 100%; margin-top: 10px; padding: 11px; background: transparent; border: 1px solid var(--border); color: var(--sub); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; border-radius: var(--r); cursor: pointer; transition: all 0.15s; }
  .back-btn:hover { border-color: var(--border2); color: var(--text); }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="card-head">
      <div class="site-name">GeoTrack <span>/ Check In</span></div>
      <div class="live-row"><div class="live-dot"></div><span class="live-text">Live</span></div>
    </div>
    <div class="card-body">

      <div id="formView">
        <div class="title">Daftar Kehadiran</div>
        <p class="desc">Masukkan nama anda. Lokasi akan dikesan secara automatik.</p>

        <div class="loc-block detecting" id="locBlock">
          <div class="loc-row">
            <div class="loc-icon" id="locIcon">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"><circle class="arc" cx="12" cy="12" r="9" stroke-dasharray="28 6"/></svg>
            </div>
            <div style="flex:1">
              <div class="loc-title" id="locTitle">Mengesan lokasi...</div>
              <div class="loc-sub"   id="locSub">Benarkan akses lokasi apabila diminta</div>
            </div>
          </div>
          <div class="coords-panel" id="coordsPanel">
            <div class="coords-grid">
              <div class="coord-item"><span class="coord-key">Latitude</span><span class="coord-val" id="latVal">—</span></div>
              <div class="coord-item"><span class="coord-key">Longitude</span><span class="coord-val" id="lngVal">—</span></div>
            </div>
            <div class="acc-row">
              <span class="acc-key">Accuracy</span>
              <span class="acc-val" id="accVal">—</span>
            </div>
          </div>
          <div class="retry-area" id="retryArea">
            <button class="retry-btn" onclick="startDetect()">Cuba semula</button>
          </div>
        </div>

        <div class="sep"></div>

        <label class="label">Nama penuh</label>
        <input type="text" class="input" id="nameInp" placeholder="Nama anda..." autocomplete="name" />
        <button class="submit" id="submitBtn" onclick="doSubmit()" disabled>
          <div id="btnContent" style="display:flex;align-items:center;gap:7px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span>Hantar</span>
          </div>
        </button>
      </div>

      <div class="success-view" id="successView">
        <div class="check-ring">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="s-title">Check In Berjaya</div>
        <p class="s-desc">Lokasi anda telah direkodkan.</p>
        <div class="data-box" id="dataBox"></div>
        <button class="back-btn" onclick="doReset()">Kembali</button>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKEBjSdoLFCgGJFFdLIzP0-_Xf_VK2Jtk",
    authDomain: "trackingapps-fb953.firebaseapp.com",
    projectId: "trackingapps-fb953",
    storageBucket: "trackingapps-fb953.firebasestorage.app",
    messagingSenderId: "803582755164",
    appId: "1:803582755164:web:6f6d90970b5859c2fbc199"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  let loc = null;

  const SPIN = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"><circle class="arc" cx="12" cy="12" r="9" stroke-dasharray="28 6"/></svg>`;
  const PIN  = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const ERR  = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  const CHK  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  window.startDetect = function () {
    loc = null;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('coordsPanel').classList.remove('show');
    document.getElementById('retryArea').style.display = 'none';
    setState('detecting', SPIN, 'Mengesan lokasi...', 'Benarkan akses lokasi apabila diminta');
    if (!navigator.geolocation) { setState('error', ERR, 'Tidak disokong', 'Browser anda tidak menyokong Geolocation'); document.getElementById('retryArea').style.display = 'block'; return; }
    navigator.geolocation.getCurrentPosition(
      ({ coords: { latitude, longitude, accuracy } }) => {
        loc = { latitude, longitude, accuracy };
        document.getElementById('latVal').textContent = latitude.toFixed(6);
        document.getElementById('lngVal').textContent = longitude.toFixed(6);
        document.getElementById('accVal').textContent = `\u00b1${Math.round(accuracy)} m`;
        document.getElementById('coordsPanel').classList.add('show');
        setState('success', PIN, 'Lokasi ditemui', `Accuracy \u00b1${Math.round(accuracy)} m`);
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('nameInp').focus();
      },
      (err) => {
        const msgs = ['','Permission ditolak. Benarkan akses lokasi di tetapan browser.','Lokasi tidak dapat dikesan. Pastikan GPS aktif.','Masa tamat. Cuba semula.'];
        setState('error', ERR, 'Gagal mengesan', msgs[err.code] || 'Ralat tidak diketahui');
        document.getElementById('retryArea').style.display = 'block';
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  };

  function setState(state, icon, title, sub) {
    document.getElementById('locBlock').className  = `loc-block ${state}`;
    document.getElementById('locIcon').innerHTML   = icon;
    document.getElementById('locTitle').textContent = title;
    document.getElementById('locSub').textContent   = sub;
  }

  window.doSubmit = async function () {
    const name = document.getElementById('nameInp').value.trim();
    if (!name) {
      const inp = document.getElementById('nameInp');
      inp.classList.add('err'); inp.focus();
      setTimeout(() => inp.classList.remove('err'), 400); return;
    }
    if (!loc) return;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('btnContent').innerHTML = '<div class="spin"></div><span>Menghantar...</span>';
    try {
      await addDoc(collection(db, 'locations'), {
        name, latitude: loc.latitude, longitude: loc.longitude,
        accuracy: loc.accuracy, timestamp: serverTimestamp(), source: 'checkin'
      });
      document.getElementById('dataBox').innerHTML =
        `<b>Nama</b>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${esc(name)}<br>` +
        `<b>Latitude</b>&nbsp;&nbsp;&nbsp;${loc.latitude.toFixed(6)}<br>` +
        `<b>Longitude</b>&nbsp;${loc.longitude.toFixed(6)}<br>` +
        `<b>Accuracy</b>&nbsp;&nbsp;\u00b1${Math.round(loc.accuracy)} m<br>` +
        `<b>Masa</b>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${new Date().toLocaleString('ms-MY')}`;
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').classList.add('show');
    } catch (e) {
      setState('error', ERR, 'Gagal menghantar', e.message);
      document.getElementById('retryArea').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('btnContent').innerHTML = CHK + '<span>Hantar</span>';
    }
  };

  window.doReset = function () {
    document.getElementById('nameInp').value = '';
    document.getElementById('formView').style.display = 'block';
    document.getElementById('successView').classList.remove('show');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('btnContent').innerHTML = CHK + '<span>Hantar</span>';
    loc = null; startDetect();
  };

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  document.getElementById('nameInp').addEventListener('keydown', e => { if (e.key==='Enter') window.doSubmit(); });
  startDetect();
</script>
</body>
</html>
